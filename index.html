<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanz Angebot</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .main-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        .verzeichnis-box { margin-top: 50px; padding: 20px; background: #fff; border: 1px solid #ddd; border-radius: 10px; max-width: 600px; margin: 40px auto; text-align: left; }
        #link-list { max-height: 200px; overflow-y: scroll; border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px; }
        a { display: block; padding: 5px 0; color: #007bff; text-decoration: none; font-size: 14px; border-bottom: 1px dotted #eee; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>Dein Finanz Angebot</h1>
        <p>Hier finden Sie die besten Konditionen...</p>
        </div>

    <div class="verzeichnis-box">
        <h3>Finanz-Themen Index</h3>
        <div id="link-list">Lade Themen...</div>
    </div>

    <script>
        fetch('/liste.txt')
            .then(r => r.text())
            .then(data => {
                const container = document.getElementById('link-list');
                const lines = data.split('\n');
                container.innerHTML = '';
                lines.forEach(line => {
                    if(line.trim()) {
                        const a = document.createElement('a');
                        a.href = "/" + line.trim();
                        a.textContent = line.trim().replace(/-/g, ' ').toUpperCase();
                        container.appendChild(a);
                    }
                });
            }).catch(e => {
                document.getElementById('link-list').innerText = "Verzeichnis wird geladen...";
            });
    </script>

</body>
</html>
