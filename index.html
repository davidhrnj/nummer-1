<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wird geladen...</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center;
            max-width: 450px;
            width: 90%;
            margin-top: 50px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Das Verzeichnis ganz unten für Google */
        .sitemap-footer { 
            margin-top: 100px; 
            width: 100%; 
            max-width: 600px; 
            padding: 20px; 
            text-align: left; 
        }
        #link-list { 
            max-height: 150px; 
            overflow-y: auto; 
            background: #fff; 
            border: 1px solid #ddd; 
            padding: 10px; 
            border-radius: 5px;
        }
        a { display: block; color: #3498db; text-decoration: none; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="card">
        <div class="spinner"></div>
        <h1>Angebot wird erstellt</h1>
        <p>Bitte warten Sie einen Moment, während wir die besten Konditionen für Sie zusammenstellen...</p>
    </div>

    <div class="sitemap-footer">
        <p style="font-size: 11px; color: #999;">Verzeichnis:</p>
        <div id="link-list">Lade Themen...</div>
    </div>

    <script>
        // Lädt die Keywords dynamisch in den Footer
        fetch('/liste.txt')
            .then(r => r.text())
            .then(data => {
                const container = document.getElementById('link-list');
                const lines = data.split('\n');
                container.innerHTML = '';
                lines.forEach(line => {
                    if(line.trim()) {
                        const a = document.createElement('a');
                        a.href = "/" + line.trim();
                        a.textContent = line.trim().replace(/-/g, ' ').toUpperCase();
                        container.appendChild(a);
                    }
                });
            });
    </script>

</body>
</html>
