<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sitemap - Alle Finanz-Themen</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        #link-container { text-align: left; max-height: 500px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-top: 20px; background: #fff; }
        a { display: block; margin-bottom: 8px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Finanz-Themen Übersicht</h1>
        <p>Wähle ein Thema aus:</p>
        <div id="link-container">Lade Themen...</div>
    </div>
    <script>
        fetch('/liste.txt')
            .then(r => r.text())
            .then(t => {
                const lines = t.split('\n');
                const c = document.getElementById('link-container');
                c.innerHTML = ''; 
                lines.forEach(l => {
                    if(l.trim() !== "") {
                        const a = document.createElement('a');
                        a.href = "/" + l.trim();
                        a.innerText = l.trim().replace(/-/g, ' ').toUpperCase();
                        c.appendChild(a);
                    }
                });
            });
    </script>
</body>
</html>
